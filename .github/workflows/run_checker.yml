name: Scan and Update Proxies

on:
  schedule:
    # Runs automatically every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allows you to manually trigger it anytime via the GitHub "Actions" tab

jobs:
  update-proxies:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows GitHub Actions to push changes back to your repository

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 'socksio' is absolutely required for HTTPX to handle SOCKS4/5 protocols
        pip install httpx socksio

    - name: Run Proxy Checker Script
      run: python proxy_checker.py

    - name: Commit and Push Clean Proxies
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Stage the updated text files
        git add socks4.txt socks5.txt
        
        # Check if files actually changed so it doesn't fail on an empty commit
        if git diff --staged --quiet; then
          echo "No new changes or no working proxies found during this run."
        else
          git commit -m "Automated Update: Saved working SOCKS4 and SOCKS5 proxies"
          git push
        fi
