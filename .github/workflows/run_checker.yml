name: Validate & Test Proxies

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  validate-proxies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install aiohttp-socks pysocks requests

      - name: Run proxy validation script
          run: python .github/validate_proxies.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add proxies/validated/
            git commit -m "Update validated proxies - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
